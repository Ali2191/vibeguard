name: VibeGuard Security Scan
description: Scan AI-generated code for security vulnerabilities
author: VibeGuard

inputs:
  path:
    description: Path to scan (relative to repo root)
    required: false
    default: '.'
  severity:
    description: Minimum severity to fail on (critical, high, medium, low)
    required: false
    default: 'critical'
  gemini_api_key:
    description: Gemini API key for AI fix suggestions
    required: false
    default: ''

outputs:
  findings_count:
    description: Total number of findings
  critical_count:
    description: Number of critical findings
  report_path:
    description: Path to the generated HTML report

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install anthropic google-genai fastapi uvicorn click rich python-dotenv requests jinja2 python-multipart aiofiles

    - name: Run VibeGuard scan
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
      run: |
        cd ${{ github.action_path }}

        # Run scan and save JSON to file (--json-out writes clean JSON)
        python -m cli.main scan "${{ inputs.path }}" --json-out > /tmp/vg_results.json 2>/dev/null || true

        # Generate HTML report separately
        python -m cli.main scan "${{ inputs.path }}" --fix --no-ai --report 2>/dev/null || true

    - name: Parse results and set outputs
      shell: python
      run: |
        import json, os, sys

        results_file = '/tmp/vg_results.json'

        try:
            with open(results_file) as f:
                data = json.load(f)
        except Exception as e:
            print(f"Could not parse results: {e}")
            sys.exit(0)

        summary = data.get('summary', {})
        total = summary.get('total', 0)
        critical = summary.get('critical', 0)
        high = summary.get('high', 0)
        medium = summary.get('medium', 0)

        print(f"VibeGuard found {total} issues: {critical} critical, {high} high, {medium} medium")

        github_output = os.environ.get('GITHUB_OUTPUT', '')
        if github_output:
            with open(github_output, 'a') as f:
                f.write(f"findings_count={total}\n")
                f.write(f"critical_count={critical}\n")
                f.write(f"report_path=vibeguard-report.html\n")

        fail_severity = "${{ inputs.severity }}"
        order = ['critical', 'high', 'medium', 'low']
        counts = {'critical': critical, 'high': high, 'medium': medium, 'low': 0}

        if fail_severity not in order:
            fail_severity = 'critical'

        threshold = order.index(fail_severity)
        should_fail = any(counts[order[i]] > 0 for i in range(threshold + 1))

        if should_fail:
            print(f"FAIL: findings at or above '{fail_severity}' severity detected.")
            sys.exit(1)
        else:
            print(f"PASS: no findings at or above '{fail_severity}' severity.")

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vibeguard-security-report
        path: vibeguard-report.html
